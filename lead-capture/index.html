<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://brickquotepro.com/lead-capture/" />
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Real Quotes | BrickQuote Pro</title>
    <meta name="description" content="Submit your project details to local bricklayers.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="/" class="logo">BrickQuote Pro</a>
            <nav class="main-nav">
                <a href="/quote/">Calculator</a>
                <a href="/ar-measure/">AR Measure</a>
                <a href="/faq/">FAQ</a>
                <a href="/contractors">Contractors</a>
                <a href="/quote/" class="btn-primary quote-btn">Get Quote</a>
            </nav>
            <button class="mobile-menu-toggle" aria-label="Open menu">☰</button>
        </div>
    </header>

    <main class="lead-capture-page">
        <div class="container">
            <div class="lead-capture-card dashboard-card">
                <h1>Get Real Quotes From Local Bricklayers</h1>
                <p>Submit your project details and we'll connect you with qualified contractors in your area.</p>
                <form id="lead-form">
                    <div class="form-group">
                        <label for="name">Full name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone</label>
                        <input type="tel" id="phone" name="phone" required>
                    </div>
                    <div class="form-group">
                        <label for="address">Street address</label>
                        <input type="text" id="address" name="address">
                    </div>
                    <div class="form-group">
                        <label for="suburb">Suburb</label>
                        <input type="text" id="suburb" name="suburb" required>
                    </div>
                    <div class="form-group">
                        <label for="project-type">Project type</label>
                        <input type="text" id="project-type" name="project_type" required>
                    </div>
                    <div class="form-group">
                        <label for="message">Project details / message</label>
                        <textarea id="message" name="message" rows="4"></textarea>
                    </div>
                    <input type="hidden" id="quote-id" name="quote_id">
                    <button type="submit" class="btn-primary btn-block">Submit Lead</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 BrickQuote Pro. All rights reserved.</p>
        </div>
    </footer>

    <script src="/assets/js/vendor/supabase.min.js"></script>
    <script src="/config.js"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/ui-helpers.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/header-auth.js"></script>
    <script>
        (function() {
            'use strict';

            async function init() {
                const { session } = await Auth.requireAuth();
                if (!session) return;

                const params = new URLSearchParams(window.location.search);
                const quoteId = params.get('quote');
                document.getElementById('quote-id').value = quoteId || '';

                if (quoteId) {
                    const { data } = await window.sb
                        .from('quotes')
                        .select('*')
                        .eq('id', quoteId)
                        .single();
                    if (data) {
                        document.getElementById('project-type').value = data.project_type || '';
                    }
                }
            }

            document.getElementById('lead-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                UI.showLoading(e.target);
                const { data: { session } } = await window.sb.auth.getSession();
                const payload = {
                    customer_id: session.user.id,
                    quote_id: document.getElementById('quote-id').value || null,
                    name: document.getElementById('name').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    address: document.getElementById('address').value.trim(),
                    suburb: document.getElementById('suburb').value.trim(),
                    project_type: document.getElementById('project-type').value.trim(),
                    message: document.getElementById('message').value.trim(),
                    status: 'new'
                };
                const { error } = await window.sb.from('leads').insert(payload);
                UI.hideLoading(e.target);
                if (error) {
                    UI.showToast(error.message, 'error');
                    return;
                }
                UI.showToast('Lead submitted. We will be in touch soon.', 'success');
                e.target.reset();
                setTimeout(() => window.location.href = '/dashboard/customer', 2000);
            });

            init();
        })();
    </script>
</body>
</html>
