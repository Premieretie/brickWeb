# ============================================================
# Nginx configuration for brickquotepro.com
# Place at: /etc/nginx/sites-available/brickquotepro.com
# Symlink:  ln -s /etc/nginx/sites-available/brickquotepro.com \
#                 /etc/nginx/sites-enabled/brickquotepro.com
# ============================================================

# ── Rate limiting zones ──────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=general:10m rate=50r/s;

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name brickquotepro.com www.brickquotepro.com;

    # Let Certbot manage this location
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — www redirect ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.brickquotepro.com;

    ssl_certificate     /etc/letsencrypt/live/brickquotepro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brickquotepro.com/privkey.pem;

    return 301 https://brickquotepro.com$request_uri;
}

# ── HTTPS — main server ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name brickquotepro.com;

    # ── SSL / TLS ──────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/brickquotepro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brickquotepro.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers ───────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=self, microphone=(), geolocation=self" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # ── Logging ────────────────────────────────────────────
    access_log /var/log/nginx/brickquotepro_access.log;
    error_log  /var/log/nginx/brickquotepro_error.log;

    # ── Gzip compression ───────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml
               application/x-font-ttf font/opentype;

    # ── Static asset caching ───────────────────────────────
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|otf|eot)$ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ── API rate limiting ──────────────────────────────────
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Main application proxy ─────────────────────────────
    location / {
        limit_req zone=general burst=100 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # No-cache for dynamic pages
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Block common attack paths ──────────────────────────
    location ~ /\. { deny all; }
    location = /wp-login.php { return 444; }
    location = /xmlrpc.php   { return 444; }
}
