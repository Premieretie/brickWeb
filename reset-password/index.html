<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://brickquotepro.com/reset-password/" />
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | BrickQuote Pro</title>
    <meta name="description" content="Set a new password for your BrickQuote Pro account.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="/" class="logo">BrickQuote Pro</a>
            <nav class="main-nav">
                <a href="/quote/">Calculator</a>
                <a href="/ar-measure/">AR Measure</a>
                <a href="/faq/">FAQ</a>
                <a href="/quote/" class="btn-primary quote-btn">Get Quote</a>
            </nav>
            <button class="mobile-menu-toggle" aria-label="Open menu">☰</button>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Set new password</h1>
            <p class="auth-subtitle">Choose a new password for your account.</p>
            <form id="reset-form">
                <div class="form-group">
                    <label for="password">New password</label>
                    <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
                </div>
                <button type="submit" class="btn-primary btn-block">Update Password</button>
            </form>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 BrickQuote Pro. All rights reserved.</p>
        </div>
    </footer>
    <script src="/assets/js/vendor/supabase.min.js"></script>
    <script src="/config.js"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/ui-helpers.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/header-auth.js"></script>
    <script>
        (function() {
            'use strict';
            const form = document.getElementById('reset-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                UI.showLoading(form);
                const { error } = await Auth.updatePassword(form.password.value);
                UI.hideLoading(form);
                if (error) {
                    UI.showToast(error.message, 'error');
                    return;
                }
                UI.showToast('Password updated. Redirecting...', 'success');
                setTimeout(() => window.location.href = '/login', 1500);
            });
        })();
    </script>
</body>
</html>
