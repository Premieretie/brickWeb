<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://brickquotepro.com/login/" />
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BrickQuote Pro</title>
    <meta name="description" content="Log in to BrickQuote Pro to save quotes and manage your project leads.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="/" class="logo">BrickQuote Pro</a>
            <nav class="main-nav">
                <a href="/quote/">Calculator</a>
                <a href="/ar-measure/">AR Measure</a>
                <a href="/faq/">FAQ</a>
                <a href="/quote/" class="btn-primary quote-btn">Get Quote</a>
            </nav>
            <button class="mobile-menu-toggle" aria-label="Open menu">☰</button>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p class="auth-subtitle">Log in to access your saved quotes and leads.</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-primary btn-block">Log In</button>
            </form>
            <div class="auth-links">
                <p>Don't have an account? <a href="/signup">Sign up</a></p>
                <p><a href="/forgot-password">Forgot password?</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 BrickQuote Pro. All rights reserved.</p>
        </div>
    </footer>
    <script src="/assets/js/vendor/supabase.min.js"></script>
    <script src="/config.js"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/ui-helpers.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/header-auth.js"></script>
    <script>
        (function() {
            'use strict';
            Auth.requireGuest();

            const form = document.getElementById('login-form');
            const redirect = new URLSearchParams(window.location.search).get('redirect') || '/account';

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                UI.showLoading(form);
                const email = form.email.value.trim();
                const password = form.password.value;
                const { data, error } = await Auth.signIn(email, password);
                UI.hideLoading(form);
                if (error) {
                    UI.showToast(error.message, 'error');
                    return;
                }
                window.location.href = redirect;
            });
        })();
    </script>
</body>
</html>
