<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://brickquotepro.com/dashboard/customer/" />
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard | BrickQuote Pro</title>
    <meta name="description" content="View your saved quotes and submitted leads.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="/" class="logo">BrickQuote Pro</a>
            <nav class="main-nav">
                <a href="/quote/">Calculator</a>
                <a href="/ar-measure/">AR Measure</a>
                <a href="/faq/">FAQ</a>
                <a href="/contractors">Contractors</a>
                <a href="/quote/" class="btn-primary quote-btn">Get Quote</a>
            </nav>
            <button class="mobile-menu-toggle" aria-label="Open menu">☰</button>
        </div>
    </header>

    <main class="dashboard-page">
        <div class="container">
            <div class="dashboard-header">
                <h1>Customer Dashboard</h1>
                <p>Manage your saved quotes and project leads.</p>
            </div>
            <div class="dashboard-grid">
                <aside class="dashboard-sidebar">
                    <nav>
                        <a href="/dashboard/customer" class="active">Overview</a>
                        <a href="/account">Account</a>
                        <a href="#" id="logout-link">Log out</a>
                    </nav>
                </aside>
                <div class="dashboard-main">
                    <div class="stats-grid">
                        <div class="stat-card"><span>Saved Quotes</span><strong id="stat-quotes">0</strong></div>
                        <div class="stat-card"><span>Submitted Leads</span><strong id="stat-leads">0</strong></div>
                    </div>

                    <div class="dashboard-card">
                        <h2>Saved Quotes</h2>
                        <div id="quotes-list">
                            <div class="empty-state">Loading...</div>
                        </div>
                    </div>

                    <div class="dashboard-card">
                        <h2>Submitted Leads</h2>
                        <div id="leads-list">
                            <div class="empty-state">Loading...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 BrickQuote Pro. All rights reserved.</p>
        </div>
    </footer>

    <script src="/assets/js/vendor/supabase.min.js"></script>
    <script src="/config.js"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/ui-helpers.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/header-auth.js"></script>
    <script>
        (function() {
            'use strict';

            async function init() {
                const { session } = await Auth.requireAuth(['customer', 'admin']);
                if (!session) return;
                await loadQuotes();
                await loadLeads();
            }

            async function loadQuotes() {
                const { data, error } = await window.sb
                    .from('quotes')
                    .select('*')
                    .eq('user_id', (await window.sb.auth.getSession()).data.session.user.id)
                    .eq('is_active', true)
                    .order('created_at', { ascending: false });
                const container = document.getElementById('quotes-list');
                if (error) {
                    UI.showToast(error.message, 'error');
                    return;
                }
                document.getElementById('stat-quotes').textContent = data?.length || 0;
                if (!data || data.length === 0) {
                    UI.renderEmptyState(container, 'No saved quotes yet. <a href="/quote/">Get a quote</a>');
                    return;
                }
                container.innerHTML = `<table class="bq-table">
                    <thead><tr><th>Project</th><th>Material</th><th>Estimate</th><th>Date</th><th></th></tr></thead>
                    <tbody>${data.map(q => `<tr>
                        <td>${q.project_type || 'Project'}</td>
                        <td>${q.material || '-'}</td>
                        <td>${UI.formatCurrency(q.estimate)}</td>
                        <td>${UI.formatDate(q.created_at)}</td>
                        <td class="actions">
                            <a href="/quote/?quote=${q.id}" class="btn-text btn-small">Open</a>
                            <button class="btn-text btn-small delete-quote" data-id="${q.id}">Delete</button>
                        </td>
                    </tr>`).join('')}</tbody>
                </table>`;
                container.querySelectorAll('.delete-quote').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (!confirm('Delete this quote?')) return;
                        const { error } = await window.sb.from('quotes').update({ is_active: false }).eq('id', btn.dataset.id);
                        if (error) UI.showToast(error.message, 'error');
                        else loadQuotes();
                    });
                });
            }

            async function loadLeads() {
                const { data: { session } } = await window.sb.auth.getSession();
                const { data, error } = await window.sb
                    .from('leads')
                    .select('*')
                    .eq('customer_id', session.user.id)
                    .order('created_at', { ascending: false });
                const container = document.getElementById('leads-list');
                if (error) {
                    UI.showToast(error.message, 'error');
                    return;
                }
                document.getElementById('stat-leads').textContent = data?.length || 0;
                if (!data || data.length === 0) {
                    UI.renderEmptyState(container, 'No leads yet. Submit a lead from a quote.');
                    return;
                }
                container.innerHTML = `<table class="bq-table">
                    <thead><tr><th>Suburb</th><th>Project</th><th>Status</th><th>Date</th></tr></thead>
                    <tbody>${data.map(l => `<tr>
                        <td>${l.suburb || '-'}</td>
                        <td>${l.project_type || '-'}</td>
                        <td><span class="status-badge status-${l.status}">${l.status}</span></td>
                        <td>${UI.formatDate(l.created_at)}</td>
                    </tr>`).join('')}</tbody>
                </table>`;
            }

            document.getElementById('logout-link').addEventListener('click', async (e) => {
                e.preventDefault();
                await Auth.signOut();
                window.location.href = '/';
            });

            init();
        })();
    </script>
</body>
</html>
