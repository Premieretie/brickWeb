<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://brickquotepro.com/forgot-password/" />
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | BrickQuote Pro</title>
    <meta name="description" content="Reset your BrickQuote Pro password.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="/" class="logo">BrickQuote Pro</a>
            <nav class="main-nav">
                <a href="/quote/">Calculator</a>
                <a href="/ar-measure/">AR Measure</a>
                <a href="/faq/">FAQ</a>
                <a href="/quote/" class="btn-primary quote-btn">Get Quote</a>
            </nav>
            <button class="mobile-menu-toggle" aria-label="Open menu">☰</button>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-card">
            <h1>Reset password</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>
            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                </div>
                <button type="submit" class="btn-primary btn-block">Send Reset Link</button>
            </form>
            <div class="auth-links">
                <p>Remember your password? <a href="/login">Log in</a></p>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 BrickQuote Pro. All rights reserved.</p>
        </div>
    </footer>
    <script src="/assets/js/vendor/supabase.min.js"></script>
    <script src="/config.js"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/ui-helpers.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/header-auth.js"></script>
    <script>
        (function() {
            'use strict';
            const form = document.getElementById('forgot-form');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                UI.showLoading(form);
                const { error } = await Auth.resetPassword(form.email.value.trim());
                UI.hideLoading(form);
                if (error) {
                    UI.showToast(error.message, 'error');
                    return;
                }
                UI.showToast('Password reset link sent. Check your email.', 'success');
                form.reset();
            });
        })();
    </script>
</body>
</html>
