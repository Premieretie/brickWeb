<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="canonical" href="https://brickquotepro.com/contractors/profile/" />
<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contractor Profile | BrickQuote Pro</title>
    <meta name="description" content="View contractor profile, gallery, and contact details.">
    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="/" class="logo">BrickQuote Pro</a>
            <nav class="main-nav">
                <a href="/quote/">Calculator</a>
                <a href="/ar-measure/">AR Measure</a>
                <a href="/faq/">FAQ</a>
                <a href="/contractors">Contractors</a>
                <a href="/quote/" class="btn-primary quote-btn">Get Quote</a>
            </nav>
            <button class="mobile-menu-toggle" aria-label="Open menu">☰</button>
        </div>
    </header>

    <main class="directory-page">
        <div class="container">
            <div id="profile-content">
                <div class="empty-state">Loading profile...</div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 BrickQuote Pro. All rights reserved.</p>
        </div>
    </footer>

    <script src="/assets/js/vendor/supabase.min.js"></script>
    <script src="/config.js"></script>
    <script src="/assets/js/supabase-client.js"></script>
    <script src="/assets/js/ui-helpers.js"></script>
    <script src="/assets/js/auth.js"></script>
    <script src="/assets/js/header-auth.js"></script>
    <script>
        (function() {
            'use strict';

            async function init() {
                const slug = window.location.pathname.split('/').filter(Boolean).pop();
                if (!slug) {
                    window.location.href = '/contractors';
                    return;
                }
                const { data: contractor, error } = await window.sb
                    .from('contractors')
                    .select('*, service_areas(suburb), gallery_images(*)')
                    .eq('slug', slug)
                    .eq('is_active', true)
                    .single();
                const container = document.getElementById('profile-content');
                if (error || !contractor) {
                    container.innerHTML = '<div class="empty-state">Contractor not found. <a href="/contractors">Back to directory</a></div>';
                    return;
                }
                const areas = (contractor.service_areas || []).map(a => a.suburb).filter(Boolean).join(', ');
                const gallery = (contractor.gallery_images || []).map(img => `<div class="gallery-item"><img src="${img.url}" alt="${img.caption || ''}"></div>`).join('');
                container.innerHTML = `
                    <div class="dashboard-card">
                        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:20px;">
                            ${contractor.logo_url ? `<img src="${contractor.logo_url}" alt="${contractor.business_name}" style="width:100px;height:100px;object-fit:cover;border-radius:12px;">` : ''}
                            <div>
                                <h1>${contractor.business_name}</h1>
                                <p>${contractor.contact_name || ''} ${areas ? `• ${areas}` : ''}</p>
                            </div>
                        </div>
                        <p>${contractor.description || ''}</p>
                        <div class="contractor-meta" style="margin-top:16px;">
                            ${contractor.phone ? `<span>📞 ${contractor.phone}</span>` : ''}
                            ${contractor.email ? `<span>✉️ ${contractor.email}</span>` : ''}
                            ${contractor.website ? `<span>🌐 <a href="${contractor.website}" target="_blank">${contractor.website}</a></span>` : ''}
                            ${contractor.abn ? `<span>ABN: ${contractor.abn}</span>` : ''}
                        </div>
                    </div>
                    ${gallery ? `<div class="dashboard-card"><h2>Gallery</h2><div class="gallery-grid">${gallery}</div></div>` : ''}
                    <div class="dashboard-card">
                        <h2>Get a quote from ${contractor.business_name}</h2>
                        <a href="/quote/?contractor=${contractor.id}" class="btn-primary">Request Quote</a>
                    </div>
                `;
            }

            init();
        })();
    </script>
</body>
</html>
