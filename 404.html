<!DOCTYPE html>
<html lang="en-AU">
<head>

    <style>
        .not-found { min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 60px 24px; }
        .not-found h1 { font-size: 6rem; font-weight: 700; color: var(--primary); line-height: 1; margin-bottom: 16px; }

        .not-found p { color: var(--text-light); margin-bottom: 32px; }

<body>
    <header class="main-header">
        <div class="container">
            <a href="/" class="logo">

            <nav class="main-nav">
                <a href="/quote/">Calculator</a>
                <a href="/faq/">FAQ</a>
                <a href="/quote/" class="btn-primary quote-btn">Get Quote</a>

    <main>
        <div class="not-found">
            <div>
                <h1>404</h1>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 BrickQuote Pro. All rights reserved.</p>
            </div>
